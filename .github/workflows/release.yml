name: Build Windows EXE (signed) + Release ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect where the frontend lockfile actually is (prevents setup-node cache error)
      - name: Detect assets lockfile
        id: detect_lock
        shell: pwsh
        run: |
          $lockPath = $null
          if (Test-Path "assets/package-lock.json") { $lockPath = "assets/package-lock.json" }
          elseif (Test-Path "src-tauri/assets/package-lock.json") { $lockPath = "src-tauri/assets/package-lock.json" }

          if ($lockPath) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            "path=$lockPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Found lockfile: $lockPath"
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No package-lock.json found in assets/ or src-tauri/assets/"
          }

      # Node setup WITH cache only when the lockfile is resolvable
      - name: Setup Node.js (with npm cache)
        if: steps.detect_lock.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ steps.detect_lock.outputs.path }}

      - name: Setup Node.js (no cache)
        if: steps.detect_lock.outputs.exists != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install deps in the correct "assets" directory.
      # Priority: root assets/ ; fallback: src-tauri/assets/
      - name: Install web dependencies in assets
        id: webdeps
        shell: pwsh
        run: |
          $assetsDir = $null
          if (Test-Path "assets/package.json") { $assetsDir = "assets" }
          elseif (Test-Path "src-tauri/assets/package.json") { $assetsDir = "src-tauri/assets" }

          if (-not $assetsDir) {
            Write-Error "No assets/package.json found (checked: assets/, src-tauri/assets/)."
          }

          Write-Host "Using assets directory: $assetsDir"
          "dir=$assetsDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

          Push-Location $assetsDir
          if (Test-Path "package-lock.json") { npm ci } else { npm install }

          # Build if a build script exists
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          if ($pkg.scripts -and $pkg.scripts.build) {
            npm run build
          } else {
            Write-Host "No build script found; skipping npm run build"
          }
          Pop-Location

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Enable sccache
        shell: pwsh
        run: |
          "RUSTC_WRAPPER=sccache" | Out-File -Append $env:GITHUB_ENV
          "SCCACHE_CACHE_SIZE=2G"  | Out-File -Append $env:GITHUB_ENV

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version ^1.6

      # Stage web assets into ./dist
      - name: Stage web assets to ./dist
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Force dist | Out-Null

          $assetsDir = "${{ steps.webdeps.outputs.dir }}"

          # Prefer built output if present
          $src = $assetsDir
          if (Test-Path "$assetsDir\dist\index.html") { $src = "$assetsDir\dist" }
          elseif (Test-Path "$assetsDir\build\index.html") { $src = "$assetsDir\build" }

          Write-Host "Staging from: $src"
          Copy-Item "$src\*" dist -Recurse -Force
          if (-not (Test-Path dist\index.html)) {
            Write-Error "index.html missing in staged dist (source=$src)"
          }

      - name: Generate icons (idempotent)
        run: cargo tauri icon src-tauri/icon.png

      - name: Prepare code signing (optional)
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:WINDOWS_CERTIFICATE -and $env:WINDOWS_CERTIFICATE_PASSWORD) {
            New-Item -ItemType Directory -Force certificate | Out-Null
            Set-Content certificate\cert.b64 $env:WINDOWS_CERTIFICATE
            certutil -decode certificate\cert.b64 certificate\codesign.pfx | Out-Null
            "TAURI_WIN_CERT_PATH=$(Resolve-Path certificate\codesign.pfx)" | Out-File -FilePath $env:GITHUB_ENV -Append
            "TAURI_WIN_CERT_PASS=$($env:WINDOWS_CERTIFICATE_PASSWORD)" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Build portable EXE
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_WIN_CERT_PATH: ${{ env.TAURI_WIN_CERT_PATH }}
          TAURI_WIN_CERT_PASS: ${{ env.TAURI_WIN_CERT_PASS }}
          TAURI_BUNDLE_TARGETS: app
        with:
          bundles: app
          args: --config src-tauri/tauri.ci.json

      - name: Prepare release asset (zip + sha256)
        id: prep
        shell: pwsh
        run: |
          $exe = Get-ChildItem src-tauri/target/release -Filter TauriKargo*.exe -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No EXE found after build." }

          $toml = Get-Content src-tauri\Cargo.toml -Raw
          if ($toml -match '(?m)^\s*version\s*=\s*"([^"]+)"') { $v = $Matches[1] } else { $v = "0.0.0" }

          $zip = "TauriKargo-$v-windows-x64.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }

          Compress-Archive -Path $exe.FullName -DestinationPath $zip
          $sha256 = (Get-FileHash $zip -Algorithm SHA256).Hash

          "exe=$($exe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip=$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "sha256=$sha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest signed build
          make_latest: true
          prerelease: true
          draft: false
          files: ${{ steps.prep.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Job summary
        shell: pwsh
        run: |
          $zip="${{ steps.prep.outputs.zip }}"
          $exe="${{ steps.prep.outputs.exe }}"
          $sha="${{ steps.prep.outputs.sha256 }}"
          $v="${{ steps.prep.outputs.version }}"
          $lines = @()
          $lines += "# Build Windows (cache + signature si secrets)"
          $lines += ("Version : {0}" -f $v)
          $lines += ("EXE : {0}" -f $exe)
          $lines += ("Fichier ZIP : {0}" -f $zip)
          $lines += ("SHA256 ZIP : {0}" -f $sha)
          $lines += ""
          $lines += "#Telechargez depuis Releases -> Latest signed build (lien permanent)."
          $lines | Set-Content -Path $env:GITHUB_STEP_SUMMARY -Encoding utf8

      - name: Upload artifact (EXE)
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows-exe
          path: ${{ steps.prep.outputs.exe }}
          if-no-files-found: error
          compression-level: 0
